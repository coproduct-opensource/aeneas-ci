name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  self-test-minimal:
    name: Self-test — minimal example
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: ./
        with:
          rust-source-dir: examples/minimal
          lean-output-dir: examples/minimal/lean-out
          # Pinned compatible pair. The action's own README forbids floating
          # refs ("charon-version main" was a silent-drift footgun — exactly
          # what this action exists to prevent). Bump together; never
          # independently. Charon SHA matches AeneasVerif/aeneas/charon-pin
          # for the corresponding Aeneas nightly.
          charon-version: 3c55c65462133f6847d9bed7380497395a1564a2
          aeneas-version: nightly-2026.05.27
          fail-on-drift: 'false'   # First run only — examples/minimal/lean-out
                                   # gets created. Flip to 'true' once committed.

  shellcheck:
    name: shellcheck install-aeneas.sh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: shellcheck scripts/install-aeneas.sh
